    <script type="text/javascript">
      $(function () {
		var jobs = $._processing(data,'fl','jobname')
        let t1 = ``;
        for (let i in jobs) {
          t1 += `<p>${i}</p>`;
        }
        let keyw = data[0].fl;
        console.log(t1);
        $(".checkList").html(t1);
        $(".checkList>p").eq(0).addClass("ckli");
        renderul(keyw);

        $(".checkList>p").each((index, item) => {
          $(item).on("click", () => {
            $(".checkList>p").removeClass("ckli");
            $(item).addClass("ckli");
            keyw = $(item).text();
            renderul(keyw);
          });
        });
        function jiaohu() {
          $(".jobLi>li>.litp1").each((index, item) => {
            $(item).on("click", () => {
              if ($(".jobLi>li>.libt1").eq(index).hasClass("showli")) {
                $(".jobLi>li>.litp1").eq(index).removeClass("tabli");
                $(".dn1").eq(index).removeClass("showli2");
                $(".jobLi>li>.libt1").eq(index).removeClass("showli");
              } else {
                $(".jobLi>li>.libt1").removeClass("showli");
                $(".jobLi>li>.litp1").removeClass("tabli");
                $(".jobLi>li>.litp1").eq(index).addClass("tabli");
                $(".dn1").removeClass("showli2");
                $(".dn1").eq(index).addClass("showli2");
                $(".jobLi>li>.libt1").eq(index).addClass("showli");
              }
            });
          });
          $(".litp1 a").each((index, item) => {
            $(item).mouseenter(() => {
              $(".litp1 a").removeClass("ckli");
              $(item).addClass("ckli");
            });
          });
        }
        function renderul(keyw) {
          for (let i in jobs) {
            if (i == keyw) {
              joblis = jobs[i];
              var t2 = ``;
              for (let o in joblis) {
                var t3 = ``;
                for (let ah in joblis[o]) {
                  t3 += `<a href=${joblis[o][ah]["link"]} target='_blank'>${joblis[o][ah]["city"]}</a>`;
                }
                t2 += `<li>
							<div class="litp1">
								<p>${o}</p>
								<div class='dn1'>${t3}</div>
							</div>
							<div class="libt1">
								<p>
									${joblis[o][0].jobinfo.replace(/(任职资格：|工作内容：)/gm,'<span>$1</span>')}
								<span class='zhuyi'>*点击城市进行投递</span>
								</p>

							</div>
						</li>`;
              }
            }
          }
          $(".jobLi").html(t2);
          // $('.jobLi>li:nth-child(1)>.litp1').addClass('tabli')
          // $('.jobLi>li:nth-child(1)>.litp1>.dn1').addClass('showli2');
          // $('.jobLi>li:nth-child(1)>.libt1').addClass('showli');
          jiaohu();
        }
      });
    </script>
