    <!--职位数据接口-->
    <!--swiper轮播-->
    <!-- <script type='text/javascript' src='https://campus.51job.com/51job-ideal-cdn/swiper/2022d5d2d0/swiper.min.js'></script> -->
    <!--swiper轮播-->
    <script type="text/javascript" src="js/main.js"></script>
    <script src="./js/company.js"></script>
    <script type="text/javascript">
      let flag = true;
      // 渲染企业
      function renderCompany() {
        let companyCateHtml = "";

        [...new Set(companyList.map((item) => item.cate))].forEach((item) => {
          let companyHtml = "";
          companyList
            .filter((company) => company.cate === item)
            .forEach((company) => {
              company.name = company.name.replace(/\n/g, "<br />");
              companyHtml += `<div class="company-item" data-coid="${company.coid}">${company.name}</div>`;
            });
          companyCateHtml += `<div class="company-cate-item">
                  <div class="company-cate-name">${item}</div>
                  <div class="company-list">${companyHtml}</div>
                </div>`;
        });
        $(".company-cate-list").html(companyCateHtml);
      }
      renderCompany();

      // 渲染公司详情
      async function renderCompanyInfo(coid) {
        let company = companyList.find((company) => company.coid == coid);

        // 获取职位列表
        let jobList = await getJobList(company.coid);
        let jobHtml = "";
        if (jobList.length) {
          jobList.forEach((job) => {
            let jobLink = `https://xyz.51job.com/external/apply.aspx?jobid=${job.jobid}&ctmid=${job.ctmid}`;
            jobHtml += `<div class="job-item">
                        <div class="job-name">
                          <img src="./images/i8.png" alt="" class="job-icon" />
                          ${job.jobname}
                        </div>
                        <div class="job-location">工作地点：${job.jobareaname}</div>
                        <a href="${jobLink}" target="_blank" class="job-btn">立即投递</a>
                      </div>`;
          });
        } else {
          jobHtml = `<div class="no-job">暂无职位信息</div>`;
        }

        let html = `<div class="company-title">${company.name}</div>
                  <div class="company-info">
                    <div class="company-desc indent">
                      ${company.desc
                        .split("\n")
                        .map((item) => `<p>${item}</p>`)
                        .join("")}
                    </div>
                    <div class="company-desc-cell">
                      <span class="label">联系人：</span>${company.contact}
                    </div>
                    <div class="company-desc-cell">
                      <span class="label">联系邮箱：</span>${company.email}
                    </div>
                    <a class="company-desc-cell" href="${
                      company.website
                    }" target="_blank" style="display: ${
          company.website ? "block" : "none"
        };">
                      <span class="label">官网链接：</span>${company.website}
                    </a>

                    <div class="job-list">
                      ${jobHtml}
                    </div>
                </div>`;

        $(".company-info-wrap").html(html);
      }

      // 获取职位列表
      function getJobList(coid) {
        return new Promise((resolve, reject) => {
          coapi.getJobList(
            { coid, ctmid: 8063865, pagesize: 999, pagenum: 1 },
            function (res) {
              if (res.resultbody && res.resultbody.joblist.length) {
                resolve(res.resultbody.joblist);
              } else {
                resolve([]);
              }
            }
          );
        });
      }

      $(".company-cate-list").on("click", ".company-item", function () {
        $(".company-item").removeClass("active");
        $(".company-cate-name").removeClass("active");
        $(this).addClass("active");
        $(this).parent().parent().find(".company-cate-name").addClass("active");

        let coid = $(this).data("coid");
        // 更新url，但不跳转
        history.pushState({}, "", `?coid=${coid}`);

        // 渲染公司详情
        renderCompanyInfo(coid);

        if (!flag) {
          // 滚动到公司详情
          $("html, body").animate(
            { scrollTop: $(".custom-title").offset().top - 100 },
            "fast"
          );
        } else {
          flag = false;
        }
      });

      // 默认渲染
      let coid = new URLSearchParams(location.search).get("coid");
      coid = coid || companyList[0].coid;

      $(`.company-item[data-coid='${coid}']`).click();

      $(".company-info-wrap").on("click", "a.company-desc-cell", function (e) {
        e.preventDefault();
        if (
          window.confirm(
            "您即将离开前程无忧官方招聘网站，前往第三方页面。是否确认前往？"
          )
        ) {
          window.open($(this).attr("href"));
        } else {
          return false;
        }
      });
    </script>
